[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

[functions."allied-sheet-sync"]
  schedule = "0 * * * *"

[[headers]]
  for = "/api/twilio-inbound"
  [headers.values]
    X-Frame-Options = "DENY"
